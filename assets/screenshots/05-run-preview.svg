<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <rect width="1600" height="1000" fill="#F5F5F7"/>
  <text x="120" y="156" fill="#FF4931" font-family="JetBrains Mono, monospace" font-size="24" letter-spacing="3">STEP 5</text>
  <text x="120" y="228" fill="#101010" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">Preview locally before you publish</text>
  <text x="120" y="282" fill="#5E6168" font-family="Inter, Arial, sans-serif" font-size="30">Run one command, then review the site in your browser at localhost:8000.</text>

  <rect x="120" y="342" width="550" height="520" rx="32" fill="#101010"/>
  <text x="164" y="402" fill="#AAB0B8" font-family="JetBrains Mono, monospace" font-size="24">Terminal</text>
  <text x="164" y="484" fill="#55D784" font-family="JetBrains Mono, monospace" font-size="30">$</text>
  <text x="200" y="484" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="30">sh scripts/preview.sh</text>
  <text x="164" y="558" fill="#B8BDC6" font-family="JetBrains Mono, monospace" font-size="27">Serving HTTP on 0.0.0.0 port 8000</text>
  <text x="164" y="604" fill="#B8BDC6" font-family="JetBrains Mono, monospace" font-size="27">Open http://localhost:8000</text>
  <rect x="164" y="676" width="462" height="116" rx="22" fill="#17181D" stroke="#2E3138" stroke-width="3"/>
  <text x="198" y="738" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="25">Tip: check mobile width too before you push.</text>

  <rect x="716" y="342" width="764" height="520" rx="32" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="4"/>
  <rect x="716" y="342" width="764" height="76" rx="32" fill="#101010"/>
  <circle cx="762" cy="380" r="10" fill="#FF7B66"/>
  <circle cx="794" cy="380" r="10" fill="#FFCB5B"/>
  <circle cx="826" cy="380" r="10" fill="#55D784"/>
  <text x="860" y="388" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="22">http://localhost:8000</text>
  <text x="770" y="492" fill="#FF4931" font-family="JetBrains Mono, monospace" font-size="20" letter-spacing="3">STARTER DEMO</text>
  <text x="770" y="580" fill="#101010" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">Turn what you do</text>
  <text x="770" y="646" fill="#101010" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">into one clear</text>
  <text x="770" y="712" fill="#101010" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">homepage.</text>
  <rect x="770" y="758" width="214" height="60" rx="18" fill="#FF4931"/>
  <rect x="1004" y="758" width="214" height="60" rx="18" fill="#FFFFFF" stroke="#D8DCE2" stroke-width="3"/>
</svg>
