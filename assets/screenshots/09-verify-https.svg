<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <rect width="1600" height="1000" fill="#F5F5F7"/>
  <rect x="56" y="56" width="1488" height="888" rx="36" fill="#101010"/>
  <rect x="56" y="56" width="1488" height="92" rx="36" fill="#16171B"/>
  <circle cx="110" cy="102" r="10" fill="#FF7B66"/>
  <circle cx="142" cy="102" r="10" fill="#FFCB5B"/>
  <circle cx="174" cy="102" r="10" fill="#55D784"/>
  <text x="220" y="110" fill="#B7BBC4" font-family="JetBrains Mono, monospace" font-size="24">Domain status</text>

  <text x="120" y="236" fill="#FF4931" font-family="JetBrains Mono, monospace" font-size="24" letter-spacing="3">STEP 9</text>
  <text x="120" y="312" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">Verify HTTPS is active</text>
  <text x="120" y="364" fill="#A7ABB4" font-family="Inter, Arial, sans-serif" font-size="30">GitHub usually provisions the certificate after the domain and DNS match.</text>

  <rect x="120" y="428" width="1360" height="360" rx="28" fill="#17181D" stroke="#2E3138" stroke-width="4"/>
  <text x="164" y="494" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Custom domain</text>
  <text x="164" y="548" fill="#B8BDC6" font-family="Inter, Arial, sans-serif" font-size="30">www.yourdomain.com</text>
  <text x="164" y="644" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Enforce HTTPS</text>
  <rect x="164" y="676" width="356" height="66" rx="18" fill="#143927"/>
  <text x="222" y="718" fill="#6AE3A0" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">HTTPS is active</text>

  <rect x="120" y="822" width="1360" height="74" rx="22" fill="#FFF2EE"/>
  <text x="156" y="870" fill="#A13B2D" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">If HTTPS does not appear yet, wait a bit longer and re-check the DNS records.</text>
