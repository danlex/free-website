<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <rect width="1600" height="1000" fill="#F5F5F7"/>
  <rect x="64" y="64" width="1472" height="872" rx="36" fill="#101010"/>
  <rect x="64" y="64" width="1472" height="92" rx="36" fill="#16171B"/>
  <circle cx="118" cy="110" r="10" fill="#FF7B66"/>
  <circle cx="150" cy="110" r="10" fill="#FFCB5B"/>
  <circle cx="182" cy="110" r="10" fill="#55D784"/>
  <text x="230" y="118" fill="#B7BBC4" font-family="JetBrains Mono, monospace" font-size="24">Git</text>

  <text x="120" y="236" fill="#FF4931" font-family="JetBrains Mono, monospace" font-size="24" letter-spacing="3">STEP 6</text>
  <text x="120" y="312" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">Commit and push your changes</text>
  <text x="120" y="364" fill="#A7ABB4" font-family="Inter, Arial, sans-serif" font-size="30">Once the local preview looks right, push the updated starter to GitHub.</text>

  <rect x="120" y="424" width="1360" height="330" rx="28" fill="#17181D" stroke="#2E3138" stroke-width="4"/>
  <text x="164" y="492" fill="#55D784" font-family="JetBrains Mono, monospace" font-size="30">$</text>
  <text x="200" y="492" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="30">git add .</text>
  <text x="164" y="552" fill="#55D784" font-family="JetBrains Mono, monospace" font-size="30">$</text>
  <text x="200" y="552" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="30">git commit -m "Customize website"</text>
  <text x="164" y="612" fill="#55D784" font-family="JetBrains Mono, monospace" font-size="30">$</text>
  <text x="200" y="612" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="30">git push</text>
  <text x="164" y="692" fill="#8A8E97" font-family="JetBrains Mono, monospace" font-size="26">3 files changed, 148 insertions(+), 52 deletions(-)</text>

  <rect x="120" y="792" width="1360" height="92" rx="24" fill="#FFF2EE"/>
  <text x="156" y="848" fill="#A13B2D" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">After this step, GitHub Pages can publish the version you just pushed.</text>
</svg>
