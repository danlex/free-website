  <text x="220" y="110" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="24" letter-spacing="2">Codex</text>

  <text x="120" y="220" fill="#FF4931" font-family="JetBrains Mono, monospace" font-size="24" letter-spacing="3">STEP 3</text>
  <text x="120" y="292" fill="#101010" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">Open the repo in Codex</text>
  <text x="120" y="346" fill="#5E6168" font-family="Inter, Arial, sans-serif" font-size="30">You only need three root files to start reshaping the site.</text>

  <rect x="120" y="406" width="316" height="436" rx="28" fill="#101010"/>
  <text x="154" y="458" fill="#AAB0B8" font-family="JetBrains Mono, monospace" font-size="24">free-website</text>
  <rect x="146" y="500" width="264" height="58" rx="16" fill="#1C1E24"/>
  <text x="170" y="538" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="24">index.html</text>
  <rect x="146" y="572" width="264" height="58" rx="16" fill="#17181D"/>
  <text x="170" y="610" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="24">styles.css</text>
  <rect x="146" y="644" width="264" height="58" rx="16" fill="#17181D"/>
  <text x="170" y="682" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="24">script.js</text>
  <rect x="146" y="716" width="264" height="58" rx="16" fill="#17181D"/>
  <text x="170" y="754" fill="#8A8E97" font-family="JetBrains Mono, monospace" font-size="24">prompts/</text>

  <rect x="470" y="406" width="1010" height="436" rx="28" fill="#F6F7F9" stroke="#E7EAEE" stroke-width="3"/>
  <rect x="470" y="406" width="1010" height="76" rx="28" fill="#FFFFFF"/>
  <text x="520" y="456" fill="#101010" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">What you edit first</text>
  <text x="520" y="544" fill="#101010" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">1. Replace the hero copy</text>
  <text x="520" y="592" fill="#5E6168" font-family="Inter, Arial, sans-serif" font-size="28">Change the audience, promise, and CTA so the page sounds like you.</text>
  <text x="520" y="668" fill="#101010" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">2. Remove the sections you do not need</text>
  <text x="520" y="716" fill="#5E6168" font-family="Inter, Arial, sans-serif" font-size="28">The starter is flexible, but simpler pages usually convert better.</text>
  <text x="520" y="792" fill="#101010" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">3. Add proof before you publish</text>
  <text x="520" y="840" fill="#5E6168" font-family="Inter, Arial, sans-serif" font-size="28">Use a testimonial, metric, client logo, or example of work.</text>
</svg>
