<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <rect width="1600" height="1000" fill="#F5F5F7"/>
  <rect x="64" y="64" width="1472" height="872" rx="36" fill="#101010"/>
  <rect x="64" y="64" width="1472" height="92" rx="36" fill="#16171B"/>
  <circle cx="118" cy="110" r="10" fill="#FF7B66"/>
  <circle cx="150" cy="110" r="10" fill="#FFCB5B"/>
  <circle cx="182" cy="110" r="10" fill="#55D784"/>
  <text x="230" y="118" fill="#B7BBC4" font-family="JetBrains Mono, monospace" font-size="24">Terminal</text>

  <text x="120" y="236" fill="#FF4931" font-family="JetBrains Mono, monospace" font-size="24" letter-spacing="3">STEP 2</text>
  <text x="120" y="312" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">Clone your copy of the repo</text>
  <text x="120" y="364" fill="#A7ABB4" font-family="Inter, Arial, sans-serif" font-size="30">The URL should point to your GitHub account, not to danlex/free-website.</text>

  <rect x="120" y="426" width="1360" height="288" rx="28" fill="#17181D" stroke="#2E3138" stroke-width="4"/>
  <text x="164" y="492" fill="#55D784" font-family="JetBrains Mono, monospace" font-size="30">$</text>
  <text x="200" y="492" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="30">git clone https://github.com/your-username/free-website.git</text>
  <text x="164" y="554" fill="#55D784" font-family="JetBrains Mono, monospace" font-size="30">$</text>
  <text x="200" y="554" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="30">cd free-website</text>
  <text x="164" y="640" fill="#8A8E97" font-family="JetBrains Mono, monospace" font-size="26">Cloning into 'free-website'...</text>
  <text x="164" y="686" fill="#8A8E97" font-family="JetBrains Mono, monospace" font-size="26">remote: Enumerating objects: 51, done.</text>

  <rect x="120" y="766" width="648" height="110" rx="24" fill="#FFF2EE"/>
  <text x="156" y="820" fill="#A13B2D" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Keep the name if you want the simplest path:</text>
  <text x="156" y="854" fill="#A13B2D" font-family="Inter, Arial, sans-serif" font-size="24">it keeps the clone command and Pages setup obvious.</text>

  <rect x="804" y="766" width="676" height="110" rx="24" fill="#17181D" stroke="#2E3138" stroke-width="3"/>
  <text x="840" y="820" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="24">Tip: if you renamed the repo, replace only the last segment</text>
  <text x="840" y="854" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="24">and use cd your-repo-name</text>
</svg>
